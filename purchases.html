<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Purchases – MPCS Payables</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@700&display=swap');
:root{--blue-900:#0a1628;--blue-800:#0d2244;--blue-700:#103060;--blue-600:#1a4a8a;--blue-500:#1f5aaa;--blue-400:#3a7bd5;--blue-300:#6aa3e8;--blue-100:#ddeeff;--blue-50:#f0f6ff;--gold:#c8941a;--gold-lt:#f5e6c0;--bg:#f2f5fa;--surface:#ffffff;--border:#d0dae8;--text:#12243a;--muted:#5a6e85;--red:#c0392b;--red-lt:#fdecea;--green:#1a6b3c;--green-lt:#e3f5ea;--amber:#b45309;--amber-lt:#fef3c7;--shadow-sm:0 1px 4px rgba(10,22,40,0.08);--shadow:0 3px 12px rgba(10,22,40,0.10);--shadow-lg:0 8px 32px rgba(10,22,40,0.14);--radius:8px;--radius-sm:5px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
header{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-800) 60%,var(--blue-700) 100%);box-shadow:var(--shadow-lg);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:16px;padding:12px 28px;border-bottom:1px solid rgba(255,255,255,0.07);}
.logo-box{width:52px;height:52px;border-radius:var(--radius);background:var(--blue-600);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:1px;flex-shrink:0;}
.brand-text h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2;}
.brand-text p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px;}
.header-right{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:2px;}
.system-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);}
.today-date{font-size:11px;color:rgba(255,255,255,0.5);}
.main-nav{background:var(--blue-800);padding:0 20px;}
.nav-inner{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-link{display:flex;align-items:center;gap:6px;padding:10px 16px;text-decoration:none;color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;white-space:nowrap;border-bottom:3px solid transparent;transition:color 0.15s,border-color 0.15s;}
.nav-link:hover{color:rgba(255,255,255,0.9);}
.nav-link.active{color:#fff;border-bottom-color:var(--gold);}
.page-wrap{padding:24px 28px;max-width:1280px;}
.page-title{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.page-title h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--blue-700);}
.title-line{flex:1;height:2px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.card-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--blue-600);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--blue-50);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px 18px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);}
.form-group input,.form-group select,.form-group textarea{border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-family:'Lato',sans-serif;font-size:13px;color:var(--text);background:var(--blue-50);transition:border 0.15s,box-shadow 0.15s;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px rgba(31,90,170,0.12);background:#fff;}
.full{grid-column:1/-1;}
.btn{padding:9px 22px;border:none;border-radius:var(--radius-sm);font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:opacity 0.15s,transform 0.1s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--blue-500),var(--blue-600));color:#fff;box-shadow:0 2px 8px rgba(31,90,170,0.3);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a87015);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-warning{background:var(--amber);color:#fff;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--blue-400);color:var(--blue-500);}
.btn-outline:hover{background:var(--blue-50);}
.form-actions{margin-top:18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow-sm);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--blue-800);color:rgba(255,255,255,0.9);padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap;}
thead th:first-child{border-radius:var(--radius) 0 0 0;}
thead th:last-child{border-radius:0 var(--radius) 0 0;}
tbody tr:nth-child(even){background:var(--blue-50);}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);}
tbody tr:hover{background:#deeaf8;}
.empty-row td{text-align:center;color:var(--muted);padding:32px;font-style:italic;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:var(--blue-100);color:var(--blue-700);}
.badge-settled{background:var(--green-lt);color:var(--green);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--blue-700);color:#fff;padding:11px 22px;border-radius:var(--radius);font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;transform:translateY(10px);z-index:9999;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.toast-err{background:var(--red);}
.amt-blue{color:var(--blue-600);font-weight:700;}
.amt-red{color:var(--red);font-weight:700;}
select.inline-sel{border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:'Lato',sans-serif;font-size:12px;background:var(--blue-50);}
/* ── Sync bar ── */
.sync-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--blue-50);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--muted);margin-bottom:16px;}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.synced{background:var(--green);}
.sync-dot.error{background:var(--red);}
</style>
</head>
<body>
<div id="app-header"></div>

<div class="page-wrap">
  <div class="page-title"><h2>🛒 Purchase Entry</h2><div class="title-line"></div></div>

  <!-- ── Sync bar ── -->
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncStatus">Not synced yet</span>
    <button class="btn btn-outline btn-sm" style="margin-left:auto;" onclick="syncToSheets()">🔄 Sync to Sheets</button>
  </div>

  <div class="card">
    <div class="card-title" id="formTitle">New Purchase Entry</div>
    <div class="form-grid">
      <div class="form-group"><label>Date *</label><input type="date" id="p-date"/></div>
      <div class="form-group"><label>Supplier *</label><select id="p-supplier"><option value="">-- Select Supplier --</option></select></div>
      <div class="form-group">
        <label>Purchase Type</label>
        <select id="p-type">
          <option>Purchase</option>
          <option>Journal</option>
          <option>Return Goods (F-19)</option>
          <option>Discount Received</option>
        </select>
      </div>
      <div class="form-group"><label>Invoice No</label><input type="text" id="p-invoice" placeholder="INV-001"/></div>
      <div class="form-group"><label>Gross Amount (LKR) *</label><input type="number" id="p-amount" min="0" placeholder="0.00" oninput="calcNet()"/></div>
      <div class="form-group">
        <label>Discount Type</label>
        <select id="p-discount-type" onchange="toggleDiscount()">
          <option value="">None</option>
          <option value="percent">Percentage (%)</option>
          <option value="amount">Amount (LKR)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Discount Value</label>
        <input type="number" id="p-discount" placeholder="0" oninput="calcNet()"/>
      </div>
      <div class="form-group">
        <label>Net Amount (LKR)</label>
        <input type="number" id="p-net" readonly style="background:#e8f5e9;font-weight:700;color:var(--green);"/>
      </div>
      <div class="form-group full"><label>Description / Notes</label><input type="text" id="p-desc" placeholder="Brief description"/></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="savePurchaseForm()" id="saveBtn">+ Save Purchase</button>
      <button class="btn btn-outline" onclick="cancelEdit()">Clear</button>
      <span id="editHint" style="font-size:12px;color:var(--muted);display:none;">✏️ Editing mode</span>
    </div>
  </div>

  <div class="card" style="padding:14px 18px;">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
      <span style="font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;">Filter:</span>
      <select id="f-supplier" class="inline-sel" onchange="renderPTable()" style="min-width:160px;"><option value="">All Suppliers</option></select>
      <select id="f-type" class="inline-sel" onchange="renderPTable()">
        <option value="">All Types</option>
        <option>Purchase</option>
        <option>Journal</option>
        <option>Return Goods (F-19)</option>
        <option>Discount Received</option>
      </select>
      <span id="totalLabel" style="margin-left:auto;font-weight:900;font-size:13px;color:var(--blue-700);"></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Purchase Records</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Date</th><th>Supplier</th><th>Type</th><th>Invoice No</th><th>Description</th><th>Gross (LKR)</th><th>Discount</th><th>Net (LKR)</th><th>Actions</th></tr></thead>
      <tbody id="purchasesTable"><tr class="empty-row"><td colspan="10">No purchases yet.</td></tr></tbody>
    </table></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const COMPANY="Vali East Northern Division MPCS Ltd";
const ADDRESS="Point Pedro Road, Avarankal, Puttur, Atchuvely";
const LOGO_URL="images (1).jfif";
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwRrrVBzJUR1_56Lof3YKUhMTSAVQhfMteTRUtiDvhgeI-wOZVvOiEkJ2bI62MwqV-p/exec";
const PAGES=[
  {file:"index.html",label:"Dashboard",icon:"⊞"},
  {file:"suppliers.html",label:"Suppliers",icon:"👤"},
  {file:"purchases.html",label:"Purchases",icon:"🛒"},
  {file:"payments.html",label:"Payments",icon:"💳"},
  {file:"cheques.html",label:"Cheques",icon:"📋"},
  {file:"outstanding.html",label:"Outstanding",icon:"📊"},
  {file:"ledger.html",label:"Ledger",icon:"📒"},
  {file:"summary.html",label:"Summary",icon:"📑"},
];
function renderHeader(a){
  const today=new Date().toLocaleDateString('en-LK',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  const logoHTML=LOGO_URL?`<img src="${LOGO_URL}" alt="Logo" style="height:52px;width:52px;object-fit:contain;border-radius:8px;background:#fff;padding:3px;">`:`<div class="logo-box">VEM</div>`;
  const navLinks=PAGES.map(p=>`<a href="${p.file}" class="nav-link${a===p.file?' active':''}"><span>${p.icon}</span>${p.label}</a>`).join('');
  document.getElementById('app-header').innerHTML=`<header><div class="header-inner">${logoHTML}<div class="brand-text"><h1>${COMPANY}</h1><p>${ADDRESS}</p></div><div class="header-right"><span class="system-label">Supplier Payables System</span><span class="today-date">${today}</span></div></div><nav class="main-nav"><div class="nav-inner">${navLinks}</div></nav></header>`;
}
function getData(k){try{return JSON.parse(localStorage.getItem('mpcs_'+k)||'[]');}catch(e){return[];}}
function setData(k,v){localStorage.setItem('mpcs_'+k,JSON.stringify(v));}
function getSuppliers(){return getData('suppliers');}
function getPurchases(){return getData('purchases');}
function getPayments(){return getData('payments');}
function savePurchases(d){setData('purchases',d);}
function fmt(n){return Number(n||0).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function toast(msg,isErr=false){
  let t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(isErr?' toast-err':'');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── Sync status helper ────────────────────────────────────────
function setSyncStatus(state, msg){
  const dot    = document.getElementById('syncDot');
  const status = document.getElementById('syncStatus');
  dot.className = 'sync-dot ' + state;
  status.textContent = msg;
}

// ── Google Sheets sync (hidden iframe form POST) ──────────────
function syncToSheets(){
  setSyncStatus('syncing', 'Syncing to Google Sheets…');
  try {
    const payload = {
      action    : 'sync',
      suppliers : getSuppliers(),
      purchases : getPurchases(),
      payments  : getPayments(),
    };

    ['_syncFrame','_syncForm'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.remove();
    });

    const iframe = document.createElement('iframe');
    iframe.name  = '_syncFrame';
    iframe.id    = '_syncFrame';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.id     = '_syncForm';
    form.method = 'POST';
    form.action = APPS_SCRIPT_URL;
    form.target = '_syncFrame';
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type  = 'hidden';
    input.name  = 'data';
    input.value = JSON.stringify(payload);
    form.appendChild(input);
    document.body.appendChild(form);

    const timeout = setTimeout(()=>{
      setSyncStatus('error','Sync timed out — check Apps Script deployment');
      toast('⚠️ Sync timed out.', true);
    }, 10000);

    iframe.onload = function(){
      clearTimeout(timeout);
      const now = new Date().toLocaleTimeString('en-LK');
      setSyncStatus('synced', `Last synced: ${now}`);
      toast('✅ Google Sheets updated!');
      setTimeout(()=>{ form.remove(); iframe.remove(); }, 5000);
    };

    form.submit();

  } catch(err){
    setSyncStatus('error','Sync failed: ' + err.message);
    toast('❌ Sync failed: ' + err.message, true);
  }
}

// ── Auto-sync after every save / delete ──────────────────────
function autoSync(){
  setSyncStatus('syncing','Auto-syncing…');
  syncToSheets();
}

renderHeader('purchases.html');
document.getElementById('p-date').value=todayStr();

let editId=null;

function toggleDiscount(){
  const type=document.getElementById('p-discount-type').value;
  const input=document.getElementById('p-discount');
  if(type==='percent') input.placeholder='Enter % (e.g. 10)';
  else if(type==='amount') input.placeholder='Enter amount (e.g. 500)';
  else{input.placeholder='0';input.value='';}
  calcNet();
}

function calcNet(){
  const gross=parseFloat(document.getElementById('p-amount').value)||0;
  const dType=document.getElementById('p-discount-type').value;
  const dVal=parseFloat(document.getElementById('p-discount').value)||0;
  let net=gross;
  if(dType==='percent') net=gross-(gross*dVal/100);
  else if(dType==='amount') net=gross-dVal;
  document.getElementById('p-net').value=net.toFixed(2);
}

function populatePSuppliers(){
  ['p-supplier','f-supplier'].forEach(id=>{
    const sel=document.getElementById(id);const cur=sel.value;
    sel.innerHTML=id==='p-supplier'?'<option value="">-- Select Supplier --</option>':'<option value="">All Suppliers</option>';
    getSuppliers().forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
    if(cur)sel.value=cur;
  });
}

function savePurchaseForm(){
  const sid=document.getElementById('p-supplier').value;
  const gross=parseFloat(document.getElementById('p-amount').value);
  if(!sid){toast('Please select a supplier.',true);return;}
  if(!gross||gross<=0){toast('Enter a valid amount.',true);return;}

  const dType=document.getElementById('p-discount-type').value;
  const dVal=parseFloat(document.getElementById('p-discount').value)||0;
  let net=gross;
  if(dType==='percent') net=gross-(gross*dVal/100);
  else if(dType==='amount') net=gross-dVal;

  const sup=getSuppliers().find(s=>s.id==sid);
  const obj={
    id:editId||Date.now(),
    date:document.getElementById('p-date').value,
    supplierId:Number(sid),
    supplier:sup?sup.name:'',
    type:document.getElementById('p-type').value,
    invoice:document.getElementById('p-invoice').value.trim(),
    desc:document.getElementById('p-desc').value.trim(),
    grossAmount:gross,
    discountType:dType,
    discountValue:dVal,
    amount:net  // net amount stored as 'amount' for balance calcs
  };

  let purchases=getPurchases();
  if(editId){
    const idx=purchases.findIndex(p=>p.id===editId);
    if(idx>-1)purchases[idx]=obj;
    toast('Purchase updated.');
  } else {
    purchases.push(obj);
    toast('Purchase saved successfully.');
  }
  savePurchases(purchases);
  renderPTable();
  cancelEdit();
  autoSync(); // ← sync to Google Sheets
}

function editPurchase(id){
  const p=getPurchases().find(x=>x.id===id);
  if(!p)return;
  editId=id;
  document.getElementById('p-date').value=p.date;
  document.getElementById('p-supplier').value=p.supplierId;
  document.getElementById('p-type').value=p.type;
  document.getElementById('p-invoice').value=p.invoice||'';
  document.getElementById('p-amount').value=p.grossAmount||p.amount;
  document.getElementById('p-discount-type').value=p.discountType||'';
  document.getElementById('p-discount').value=p.discountValue||'';
  document.getElementById('p-desc').value=p.desc||'';
  calcNet();
  document.getElementById('formTitle').textContent='✏️ Edit Purchase';
  document.getElementById('saveBtn').textContent='✔ Update Purchase';
  document.getElementById('saveBtn').className='btn btn-gold';
  document.getElementById('editHint').style.display='inline';
  window.scrollTo({top:0,behavior:'smooth'});
}

function cancelEdit(){
  editId=null;
  ['p-invoice','p-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('p-amount').value='';
  document.getElementById('p-net').value='';
  document.getElementById('p-supplier').value='';
  document.getElementById('p-date').value=todayStr();
  document.getElementById('p-discount-type').value='';
  document.getElementById('p-discount').value='';
  document.getElementById('formTitle').textContent='New Purchase Entry';
  document.getElementById('saveBtn').textContent='+ Save Purchase';
  document.getElementById('saveBtn').className='btn btn-primary';
  document.getElementById('editHint').style.display='none';
}

function deletePurchaseRow(id){
  if(!confirm('Delete this purchase entry?'))return;
  savePurchases(getPurchases().filter(p=>p.id!==id));
  renderPTable();
  toast('Purchase deleted.');
  autoSync(); // ← sync to Google Sheets
}

function renderPTable(){
  let purchases=getPurchases();
  const fSup=document.getElementById('f-supplier').value;
  const fType=document.getElementById('f-type').value;
  if(fSup)purchases=purchases.filter(p=>p.supplierId==fSup);
  if(fType)purchases=purchases.filter(p=>p.type===fType);
  const total=purchases.reduce((a,p)=>a+Number(p.amount),0);
  document.getElementById('totalLabel').textContent=`Net Total: LKR ${fmt(total)}`;
  const tbody=document.getElementById('purchasesTable');
  if(!purchases.length){tbody.innerHTML='<tr class="empty-row"><td colspan="10">No records found.</td></tr>';return;}
  tbody.innerHTML=[...purchases].reverse().map((p,i)=>{
    const gross=p.grossAmount||p.amount;
    const discStr=p.discountValue?`${p.discountType==='percent'?p.discountValue+'%':'LKR '+fmt(p.discountValue)}`:'—';
    return `<tr>
      <td>${purchases.length-i}</td>
      <td>${p.date}</td>
      <td><strong>${p.supplier}</strong></td>
      <td><span class="badge badge-blue">${p.type}</span></td>
      <td>${p.invoice||'—'}</td>
      <td>${p.desc||'—'}</td>
      <td class="amt-blue">${fmt(gross)}</td>
      <td>${discStr}</td>
      <td class="amt-blue"><strong>${fmt(p.amount)}</strong></td>
      <td style="white-space:nowrap;">
        <button class="btn btn-warning btn-sm" onclick="editPurchase(${p.id})" style="margin-right:4px;">✏</button>
        <button class="btn btn-danger btn-sm" onclick="deletePurchaseRow(${p.id})">✕</button>
      </td>
    </tr>`;
  }).join('');
}

populatePSuppliers();renderPTable();
</script>
</body>
</html>
