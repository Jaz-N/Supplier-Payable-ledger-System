<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Suppliers – MPCS Payables</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@700&display=swap');
:root{--blue-900:#0a1628;--blue-800:#0d2244;--blue-700:#103060;--blue-600:#1a4a8a;--blue-500:#1f5aaa;--blue-400:#3a7bd5;--blue-300:#6aa3e8;--blue-100:#ddeeff;--blue-50:#f0f6ff;--gold:#c8941a;--gold-lt:#f5e6c0;--bg:#f2f5fa;--surface:#ffffff;--border:#d0dae8;--text:#12243a;--muted:#5a6e85;--red:#c0392b;--red-lt:#fdecea;--green:#1a6b3c;--green-lt:#e3f5ea;--amber:#b45309;--amber-lt:#fef3c7;--shadow-sm:0 1px 4px rgba(10,22,40,0.08);--shadow:0 3px 12px rgba(10,22,40,0.10);--shadow-lg:0 8px 32px rgba(10,22,40,0.14);--radius:8px;--radius-sm:5px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
header{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-800) 60%,var(--blue-700) 100%);box-shadow:var(--shadow-lg);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:16px;padding:12px 28px;border-bottom:1px solid rgba(255,255,255,0.07);}
.logo-box{width:52px;height:52px;border-radius:var(--radius);background:var(--blue-600);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:1px;flex-shrink:0;}
.brand-text h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2;}
.brand-text p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px;}
.header-right{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:2px;}
.system-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);}
.today-date{font-size:11px;color:rgba(255,255,255,0.5);}
.main-nav{background:var(--blue-800);padding:0 20px;}
.nav-inner{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-link{display:flex;align-items:center;gap:6px;padding:10px 16px;text-decoration:none;color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;white-space:nowrap;border-bottom:3px solid transparent;transition:color 0.15s,border-color 0.15s;}
.nav-link:hover{color:rgba(255,255,255,0.9);}
.nav-link.active{color:#fff;border-bottom-color:var(--gold);}
.page-wrap{padding:24px 28px;max-width:1280px;}
.page-title{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.page-title h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--blue-700);}
.title-line{flex:1;height:2px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.card-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--blue-600);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--blue-50);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px 18px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);}
.form-group input,.form-group select,.form-group textarea{border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-family:'Lato',sans-serif;font-size:13px;color:var(--text);background:var(--blue-50);transition:border 0.15s,box-shadow 0.15s;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px rgba(31,90,170,0.12);background:#fff;}
.full{grid-column:1/-1;}
.btn{padding:9px 22px;border:none;border-radius:var(--radius-sm);font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:opacity 0.15s,transform 0.1s,box-shadow 0.15s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--blue-500),var(--blue-600));color:#fff;box-shadow:0 2px 8px rgba(31,90,170,0.3);}
.btn-primary:hover{opacity:0.9;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a87015);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-warning{background:var(--amber);color:#fff;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--blue-400);color:var(--blue-500);}
.btn-outline:hover{background:var(--blue-50);}
.btn-green{background:linear-gradient(135deg,#1a6b3c,#145c32);color:#fff;}
.form-actions{margin-top:18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow-sm);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--blue-800);color:rgba(255,255,255,0.9);padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap;}
thead th:first-child{border-radius:var(--radius) 0 0 0;}
thead th:last-child{border-radius:0 var(--radius) 0 0;}
tbody tr:nth-child(even){background:var(--blue-50);}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);}
tbody tr:hover{background:#deeaf8;}
.empty-row td{text-align:center;color:var(--muted);padding:32px;font-style:italic;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.3px;}
.badge-settled{background:var(--green-lt);color:var(--green);}
.badge-pending{background:var(--amber-lt);color:var(--amber);}
.badge-advance{background:var(--blue-100);color:var(--blue-700);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--blue-700);color:#fff;padding:11px 22px;border-radius:var(--radius);font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;transform:translateY(10px);z-index:9999;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.toast-err{background:var(--red);}
.toast.toast-ok{background:var(--green);}
.amt-red{color:var(--red);font-weight:700;}
.amt-blue{color:var(--blue-600);font-weight:700;}
.amt-green{color:var(--green);font-weight:700;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:var(--radius);padding:28px;width:90%;max-width:700px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--blue-700);margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--blue-50);}
select.inline-sel{border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:'Lato',sans-serif;font-size:12px;background:var(--blue-50);}
/* Sync status bar */
.sync-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--blue-50);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--muted);margin-bottom:16px;}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.synced{background:var(--green);}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
</style>
</head>
<body>
<div id="app-header"></div>

<div class="page-wrap">
  <div class="page-title"><h2>👤 Supplier Master</h2><div class="title-line"></div></div>

  <!-- Sync Status Bar -->
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncStatus">Not synced yet</span>
    <button class="btn btn-outline btn-sm" style="margin-left:auto;" onclick="syncToSheets()">🔄 Sync data</button>
  </div>

  <div class="card">
    <div class="card-title" id="formTitle">Add New Supplier</div>
    <div class="form-grid">
      <div class="form-group"><label>Supplier Name *</label><input type="text" id="s-name" placeholder="e.g. Royal Stationery"/></div>
      <div class="form-group"><label>Ledger No</label><input type="text" id="s-ledger" placeholder="e.g. LED-001"/></div>
      <div class="form-group"><label>Contact Person</label><input type="text" id="s-contact"/></div>
      <div class="form-group"><label>Mobile No</label><input type="text" id="s-mobile"/></div>
      <div class="form-group"><label>Landline No</label><input type="text" id="s-landline"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="s-email"/></div>
      <div class="form-group"><label>Opening Balance (LKR)</label><input type="number" id="s-opening" value="0" min="0"/></div>
      <div class="form-group"><label>Opening Date</label><input type="date" id="s-opdate"/></div>
      <div class="form-group full"><label>Address / Notes</label><input type="text" id="s-address" placeholder="Address or remarks"/></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveSupplierForm()" id="saveBtn">+ Add Supplier</button>
      <button class="btn btn-outline" onclick="cancelEdit()">Clear</button>
      <span id="editHint" style="font-size:12px;color:var(--muted);display:none;">✏️ Editing mode — make changes then click Update</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Supplier List</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Supplier Name</th><th>Ledger No</th><th>Contact</th><th>Mobile</th><th>Email</th><th>Opening Bal.</th><th>Outstanding</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="suppliersTable"><tr class="empty-row"><td colspan="10">No suppliers added yet.</td></tr></tbody>
    </table></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
// ── Google Apps Script Web App URL ───────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRrrVBzJUR1_56Lof3YKUhMTSAVQhfMteTRUtiDvhgeI-wOZVvOiEkJ2bI62MwqV-p/exec";

// ── App config ───────────────────────────────────────────────
const COMPANY  = "Vali East Northern Division MPCS Ltd";
const ADDRESS  = "Point Pedro Road, Avarankal, Puttur, Atchuvely";
const LOGO_URL = "images (1).jfif";
const PAGES    = [
  {file:"index.html",      label:"Dashboard",   icon:"⊞"},
  {file:"suppliers.html",  label:"Suppliers",   icon:"👤"},
  {file:"purchases.html",  label:"Purchases",   icon:"🛒"},
  {file:"payments.html",   label:"Payments",    icon:"💳"},
  {file:"cheques.html",    label:"Cheques",     icon:"📋"},
  {file:"outstanding.html",label:"Outstanding", icon:"📊"},
  {file:"ledger.html",     label:"Ledger",      icon:"📒"},
  {file:"summary.html",    label:"Summary",     icon:"📑"},
];

// ── Header ───────────────────────────────────────────────────
function renderHeader(a){
  const today    = new Date().toLocaleDateString('en-LK',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  const logoHTML = LOGO_URL
    ? `<img src="${LOGO_URL}" alt="Logo" style="height:52px;width:52px;object-fit:contain;border-radius:8px;background:#fff;padding:3px;">`
    : `<div class="logo-box">VEM</div>`;
  const navLinks = PAGES.map(p=>`<a href="${p.file}" class="nav-link${a===p.file?' active':''}"><span>${p.icon}</span>${p.label}</a>`).join('');
  document.getElementById('app-header').innerHTML =
    `<header><div class="header-inner">${logoHTML}<div class="brand-text"><h1>${COMPANY}</h1><p>${ADDRESS}</p></div><div class="header-right"><span class="system-label">Supplier Payables System</span><span class="today-date">${today}</span></div></div><nav class="main-nav"><div class="nav-inner">${navLinks}</div></nav></header>`;
}

// ── Local storage helpers ────────────────────────────────────
function getData(k){try{return JSON.parse(localStorage.getItem('mpcs_'+k)||'[]');}catch(e){return[];}}
function setData(k,v){localStorage.setItem('mpcs_'+k,JSON.stringify(v));}
function getSuppliers(){return getData('suppliers');}
function getPurchases(){return getData('purchases');}
function getPayments() {return getData('payments');}
function saveSuppliers(d){setData('suppliers',d);}

// ── Formatting helpers ───────────────────────────────────────
function fmt(n){return Number(n||0).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayStr(){return new Date().toISOString().split('T')[0];}

// ── Balance calculator ───────────────────────────────────────
function getSupplierBalance(sid){
  const sup = getSuppliers().find(s=>s.id==sid);
  if(!sup) return {opening:0,purchases:0,paid:0,outstanding:0};
  const purchases = getPurchases().filter(p=>p.supplierId==sid).reduce((a,p)=>a+Number(p.amount),0);
  const paid      = getPayments().filter(p=>p.supplierId==sid).reduce((a,p)=>a+Number(p.amount),0);
  return {opening:Number(sup.opening),purchases,paid,outstanding:Number(sup.opening)+purchases-paid};
}

function statusBadge(o){
  if(o>0)  return `<span class="badge badge-pending">Pending</span>`;
  if(o===0) return `<span class="badge badge-settled">Settled</span>`;
  return `<span class="badge badge-advance">Advance</span>`;
}

// ── Toast ────────────────────────────────────────────────────
function toast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (type ? ' toast-'+type : '');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), 3000);
}

// ── Sync status UI ───────────────────────────────────────────
function setSyncStatus(state, msg){
  const dot    = document.getElementById('syncDot');
  const status = document.getElementById('syncStatus');
  dot.className = 'sync-dot ' + state;
  status.textContent = msg;
}

// ── Google Sheets sync (hidden iframe form POST — works from GitHub Pages) ──
function syncToSheets(){
  setSyncStatus('syncing', 'Syncing to Google Sheets…');
  try {
    const payload = {
      action    : 'sync',
      suppliers : getSuppliers(),
      purchases : getPurchases(),
      payments  : getPayments(),
    };

    // Remove any old iframe/form
    ['_syncFrame','_syncForm'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.remove();
    });

    // Hidden iframe — catches the response so no page redirect
    const iframe = document.createElement('iframe');
    iframe.name  = '_syncFrame';
    iframe.id    = '_syncFrame';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    // Hidden form — posts into the iframe (bypasses CORS)
    const form = document.createElement('form');
    form.id     = '_syncForm';
    form.method = 'POST';
    form.action = APPS_SCRIPT_URL;
    form.target = '_syncFrame';
    form.style.display = 'none';

    // Apps Script reads: e.parameter.data
    const input = document.createElement('input');
    input.type  = 'hidden';
    input.name  = 'data';
    input.value = JSON.stringify(payload);
    form.appendChild(input);
    document.body.appendChild(form);

    // Timeout fallback
    const timeout = setTimeout(()=>{
      setSyncStatus('error','Sync timed out — check Apps Script deployment');
      toast('⚠️ Sync timed out.','err');
    }, 10000);

    // iframe load = Apps Script responded = success
    iframe.onload = function(){
      clearTimeout(timeout);
      const now = new Date().toLocaleTimeString('en-LK');
      setSyncStatus('synced', `Last synced: ${now}`);
      toast('✅ Google Sheets updated!','ok');
      setTimeout(()=>{ form.remove(); iframe.remove(); }, 5000);
    };

    form.submit();

  } catch(err){
    setSyncStatus('error','Sync failed: ' + err.message);
    toast('❌ Sync failed: ' + err.message,'err');
  }
}

// ── Auto-sync after every save ────────────────────────────────
function autoSync(){
  setSyncStatus('syncing','Auto-syncing…');
  syncToSheets();
}

// ── Init ─────────────────────────────────────────────────────
renderHeader('suppliers.html');
document.getElementById('s-opdate').value = todayStr();

let editId = null;

// ── Save / Update supplier ───────────────────────────────────
function saveSupplierForm(){
  const name = document.getElementById('s-name').value.trim();
  if(!name){ toast('Supplier name is required.','err'); return; }

  const obj = {
    id      : editId || Date.now(),
    name,
    ledger  : document.getElementById('s-ledger').value.trim(),
    contact : document.getElementById('s-contact').value.trim(),
    mobile  : document.getElementById('s-mobile').value.trim(),
    landline: document.getElementById('s-landline').value.trim(),
    email   : document.getElementById('s-email').value.trim(),
    opening : parseFloat(document.getElementById('s-opening').value)||0,
    opDate  : document.getElementById('s-opdate').value,
    address : document.getElementById('s-address').value.trim(),
  };

  let s = getSuppliers();
  if(editId){
    const idx = s.findIndex(x=>x.id===editId);
    if(idx>-1) s[idx] = obj;
    toast('Supplier updated.');
  } else {
    s.push(obj);
    toast('Supplier added.');
  }

  saveSuppliers(s);
  renderSTable();
  cancelEdit();
  autoSync();   // ← sends to Google Sheets automatically
}

// ── Edit supplier ────────────────────────────────────────────
function editSup(id){
  const s = getSuppliers().find(x=>x.id===id);
  if(!s) return;
  editId = id;
  document.getElementById('s-name').value    = s.name    || '';
  document.getElementById('s-ledger').value  = s.ledger  || '';
  document.getElementById('s-contact').value = s.contact || '';
  document.getElementById('s-mobile').value  = s.mobile  || '';
  document.getElementById('s-landline').value= s.landline|| '';
  document.getElementById('s-email').value   = s.email   || '';
  document.getElementById('s-opening').value = s.opening || 0;
  document.getElementById('s-opdate').value  = s.opDate  || todayStr();
  document.getElementById('s-address').value = s.address || '';
  document.getElementById('formTitle').textContent      = '✏️ Edit Supplier';
  document.getElementById('saveBtn').textContent        = '✔ Update Supplier';
  document.getElementById('saveBtn').className          = 'btn btn-gold';
  document.getElementById('editHint').style.display     = 'inline';
  document.getElementById('s-name').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Cancel edit ──────────────────────────────────────────────
function cancelEdit(){
  editId = null;
  ['s-name','s-ledger','s-contact','s-mobile','s-landline','s-email','s-address'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('s-opening').value           = 0;
  document.getElementById('s-opdate').value            = todayStr();
  document.getElementById('formTitle').textContent     = 'Add New Supplier';
  document.getElementById('saveBtn').textContent       = '+ Add Supplier';
  document.getElementById('saveBtn').className         = 'btn btn-primary';
  document.getElementById('editHint').style.display    = 'none';
}

// ── Delete supplier ──────────────────────────────────────────
function deleteSup(id){
  if(!confirm('Delete this supplier? This cannot be undone.')) return;
  saveSuppliers(getSuppliers().filter(s=>s.id!==id));
  renderSTable();
  toast('Supplier deleted.');
  autoSync();   // ← sync deletion to Google Sheets
}

// ── Render table ─────────────────────────────────────────────
function renderSTable(){
  const s = getSuppliers(), tbody = document.getElementById('suppliersTable');
  if(!s.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="10">No suppliers added yet.</td></tr>';
    return;
  }
  tbody.innerHTML = s.map((s,i)=>{
    const b   = getSupplierBalance(s.id);
    const cls = b.outstanding>0?'amt-red':b.outstanding<0?'amt-blue':'amt-green';
    return `<tr>
      <td>${i+1}</td>
      <td><strong>${s.name}</strong><br><small style="color:var(--muted)">${s.ledger||''}</small></td>
      <td>${s.ledger||'—'}</td>
      <td>${s.contact||'—'}</td>
      <td>${s.mobile||'—'}</td>
      <td>${s.email||'—'}</td>
      <td>${fmt(s.opening)}</td>
      <td class="${cls}">${fmt(b.outstanding)}</td>
      <td>${statusBadge(b.outstanding)}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-warning btn-sm" onclick="editSup(${s.id})" style="margin-right:4px;">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSup(${s.id})">✕ Del</button>
      </td>
    </tr>`;
  }).join('');
}

renderSTable();
</script>
</body>
</html>
