<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard – MPCS Payables</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@700&display=swap');
:root{--blue-900:#0a1628;--blue-800:#0d2244;--blue-700:#103060;--blue-600:#1a4a8a;--blue-500:#1f5aaa;--blue-400:#3a7bd5;--blue-100:#ddeeff;--blue-50:#f0f6ff;--gold:#c8941a;--bg:#f2f5fa;--surface:#ffffff;--border:#d0dae8;--text:#12243a;--muted:#5a6e85;--red:#c0392b;--red-lt:#fdecea;--green:#1a6b3c;--green-lt:#e3f5ea;--amber:#b45309;--amber-lt:#fef3c7;--shadow-sm:0 1px 4px rgba(10,22,40,0.08);--shadow:0 3px 12px rgba(10,22,40,0.10);--shadow-lg:0 8px 32px rgba(10,22,40,0.14);--radius:8px;--radius-sm:5px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
header{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-800) 60%,var(--blue-700) 100%);box-shadow:var(--shadow-lg);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:16px;padding:12px 28px;border-bottom:1px solid rgba(255,255,255,0.07);}
.brand-text h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2;}
.brand-text p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px;}
.header-right{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:2px;}
.system-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);}
.today-date{font-size:11px;color:rgba(255,255,255,0.5);}
.main-nav{background:var(--blue-800);padding:0 20px;}
.nav-inner{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-link{display:flex;align-items:center;gap:6px;padding:10px 16px;text-decoration:none;color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;white-space:nowrap;border-bottom:3px solid transparent;transition:color 0.15s,border-color 0.15s;}
.nav-link:hover{color:rgba(255,255,255,0.9);}
.nav-link.active{color:#fff;border-bottom-color:var(--gold);}
.page-wrap{padding:24px 28px;max-width:1280px;}
.page-title{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.page-title h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--blue-700);}
.title-line{flex:1;height:2px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.card-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--blue-600);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--blue-50);}
.stat-row{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;border-top:4px solid var(--blue-500);box-shadow:var(--shadow-sm);transition:transform 0.15s,box-shadow 0.15s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.stat-card.red{border-top-color:var(--red);}
.stat-card.gold{border-top-color:var(--gold);}
.stat-card.green{border-top-color:var(--green);}
.stat-card.blue{border-top-color:var(--blue-400);}
.stat-card p{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;}
.stat-card h3{font-size:22px;font-weight:900;color:var(--text);}
.stat-card h3.red{color:var(--red);}
.stat-card h3.blue{color:var(--blue-600);}
.stat-card h3.green{color:var(--green);}
.stat-card h3.gold{color:var(--amber);}
.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow-sm);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--blue-800);color:rgba(255,255,255,0.9);padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;white-space:nowrap;}
thead th:first-child{border-radius:var(--radius) 0 0 0;}
thead th:last-child{border-radius:0 var(--radius) 0 0;}
tbody tr:nth-child(even){background:var(--blue-50);}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);}
tbody tr:hover{background:#deeaf8;}
.empty-row td{text-align:center;color:var(--muted);padding:32px;font-style:italic;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-settled{background:var(--green-lt);color:var(--green);}
.badge-pending{background:var(--amber-lt);color:var(--amber);}
.badge-advance{background:var(--blue-100);color:var(--blue-700);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--blue-700);color:#fff;padding:11px 22px;border-radius:var(--radius);font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;transform:translateY(10px);z-index:9999;}
.toast.show{opacity:1;transform:translateY(0);}
.amt-red{color:var(--red);font-weight:700;}
.amt-blue{color:var(--blue-600);font-weight:700;}
.amt-green{color:var(--green);font-weight:700;}
</style>
</head>
<body>
<div id="app-header"></div>

<div class="page-wrap">
  <div class="page-title"><h2>⊞ Dashboard</h2><div class="title-line"></div></div>
  <div class="stat-row" id="statRow"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;">
    <div class="card">
      <div class="card-title">🛒 Recent Purchases</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Supplier</th><th>Type</th><th>Amount (LKR)</th></tr></thead>
        <tbody id="recentPurchases"></tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title">💳 Recent Payments</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Supplier</th><th>Method</th><th>Amount (LKR)</th></tr></thead>
        <tbody id="recentPayments"></tbody>
      </table></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 Top Outstanding Suppliers</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Supplier</th><th>Opening Bal.</th><th>Purchases</th><th>Paid</th><th>Outstanding (LKR)</th><th>Status</th></tr></thead>
      <tbody id="topOutstanding"></tbody>
    </table></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const COMPANY="Vali East Northern Division MPCS Ltd";
const ADDRESS="Point Pedro Road, Avarankal, Puttur, Atchuvely";
const LOGO_URL="images (1).jfif";
const PAGES=[
  {file:"index.html",label:"Dashboard",icon:"⊞"},
  {file:"suppliers.html",label:"Suppliers",icon:"👤"},
  {file:"purchases.html",label:"Purchases",icon:"🛒"},
  {file:"payments.html",label:"Payments",icon:"💳"},
  {file:"cheques.html",label:"Cheques",icon:"📋"},
  {file:"outstanding.html",label:"Outstanding",icon:"📊"},
  {file:"ledger.html",label:"Ledger",icon:"📒"},
  {file:"summary.html",label:"Summary",icon:"📑"},
];
function renderHeader(a){
  const today=new Date().toLocaleDateString('en-LK',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  const logoHTML=LOGO_URL?`<img src="${LOGO_URL}" alt="Logo" style="height:52px;width:52px;object-fit:contain;border-radius:8px;background:#fff;padding:3px;">`:`<div class="logo-box">VEM</div>`;
  const navLinks=PAGES.map(p=>`<a href="${p.file}" class="nav-link${a===p.file?' active':''}"><span>${p.icon}</span>${p.label}</a>`).join('');
  document.getElementById('app-header').innerHTML=`<header><div class="header-inner">${logoHTML}<div class="brand-text"><h1>${COMPANY}</h1><p>${ADDRESS}</p></div><div class="header-right"><span class="system-label">Supplier Payables System</span><span class="today-date">${today}</span></div></div><nav class="main-nav"><div class="nav-inner">${navLinks}</div></nav></header>`;
}
function getData(k){try{return JSON.parse(localStorage.getItem('mpcs_'+k)||'[]');}catch(e){return[];}}
function getSuppliers(){return getData('suppliers');}
function getPurchases(){return getData('purchases');}
function getPayments(){return getData('payments');}
function fmt(n){return Number(n||0).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2});}
function getSupplierBalance(sid){
  const sup=getSuppliers().find(s=>s.id==sid);
  if(!sup)return{opening:0,purchases:0,paid:0,outstanding:0};
  const purchases=getPurchases().filter(p=>p.supplierId==sid).reduce((a,p)=>a+Number(p.amount),0);
  const paid=getPayments().filter(p=>p.supplierId==sid).reduce((a,p)=>a+Number(p.amount),0);
  return{opening:Number(sup.opening),purchases,paid,outstanding:Number(sup.opening)+purchases-paid};
}
function statusBadge(o){
  if(o>0)return`<span class="badge badge-pending">Pending</span>`;
  if(o===0)return`<span class="badge badge-settled">Settled</span>`;
  return`<span class="badge badge-advance">Advance</span>`;
}

renderHeader('index.html');

function render(){
  const suppliers=getSuppliers(),purchases=getPurchases(),payments=getPayments();
  const totalPurch=purchases.reduce((a,p)=>a+Number(p.amount),0);
  const totalPaid=payments.reduce((a,p)=>a+Number(p.amount),0);
  const totalOpening=suppliers.reduce((a,s)=>a+Number(s.opening),0);
  const totalOut=totalOpening+totalPurch-totalPaid;
  const pendingChq=payments.filter(p=>p.method==='Cheque'&&(p.chqStatus==='Issued'||p.chqStatus==='Pending')).length;
  document.getElementById('statRow').innerHTML=`
    <div class="stat-card blue"><p>Total Suppliers</p><h3 class="blue">${suppliers.length}</h3></div>
    <div class="stat-card gold"><p>Total Purchases</p><h3 class="gold">LKR ${fmt(totalPurch)}</h3></div>
    <div class="stat-card green"><p>Total Paid</p><h3 class="green">LKR ${fmt(totalPaid)}</h3></div>
    <div class="stat-card red"><p>Total Outstanding</p><h3 class="red">LKR ${fmt(totalOut)}</h3></div>
    <div class="stat-card"><p>Pending Cheques</p><h3>${pendingChq}</h3></div>`;
  const rp=[...purchases].reverse().slice(0,5);
  document.getElementById('recentPurchases').innerHTML=rp.length
    ?rp.map(p=>`<tr><td>${p.date}</td><td>${p.supplier}</td><td>${p.type}</td><td class="amt-blue">${fmt(p.amount)}</td></tr>`).join('')
    :'<tr class="empty-row"><td colspan="4">No purchases yet.</td></tr>';
  const rpay=[...payments].reverse().slice(0,5);
  document.getElementById('recentPayments').innerHTML=rpay.length
    ?rpay.map(p=>`<tr><td>${p.date}</td><td>${p.supplier}</td><td>${p.method}</td><td class="amt-green">${fmt(p.amount)}</td></tr>`).join('')
    :'<tr class="empty-row"><td colspan="4">No payments yet.</td></tr>';
  const outList=suppliers.map(s=>({...s,...getSupplierBalance(s.id)})).filter(s=>s.outstanding>0).sort((a,b)=>b.outstanding-a.outstanding).slice(0,8);
  document.getElementById('topOutstanding').innerHTML=outList.length
    ?outList.map((s,i)=>`<tr><td>${i+1}</td><td><strong>${s.name}</strong></td><td>${fmt(s.opening)}</td><td>${fmt(s.purchases)}</td><td>${fmt(s.paid)}</td><td class="amt-red">${fmt(s.outstanding)}</td><td>${statusBadge(s.outstanding)}</td></tr>`).join('')
    :'<tr class="empty-row"><td colspan="7">No outstanding balances.</td></tr>';
}
render();
</script>

<!-- ① Add this style block once (merge into your existing <style> if needed) -->
<style>
.gsheet-fab{
  position:fixed;bottom:24px;left:24px;z-index:8888;
  display:flex;flex-direction:column;align-items:flex-start;gap:8px;
}
.gsheet-fab.hidden{display:none !important;}
.gsheet-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 18px;border:none;border-radius:8px;
  font-family:'Lato',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 14px rgba(10,22,40,0.18);
  transition:opacity 0.15s,transform 0.1s;
}
.gsheet-btn:active{transform:scale(0.96);}
.gsheet-btn.sync {background:#1a6b3c;color:#fff;}
.gsheet-btn.open {background:#1f5aaa;color:#fff;}
.gsheet-panel{
  background:#fff;border:1px solid #d0dae8;border-radius:10px;
  padding:16px 20px;box-shadow:0 8px 32px rgba(10,22,40,0.14);
  min-width:300px;display:none;
}
.gsheet-panel.show{display:block;}
.gsheet-panel h4{
  font-size:12px;font-weight:900;text-transform:uppercase;
  letter-spacing:1px;color:#1a4a8a;margin-bottom:12px;
}
.gsheet-url-row{display:flex;gap:6px;}
.gsheet-url-row input{
  flex:1;border:1px solid #d0dae8;border-radius:5px;
  padding:7px 10px;font-size:12px;font-family:'Lato',sans-serif;
}
.gsheet-url-row button{
  padding:7px 12px;background:#1a4a8a;color:#fff;border:none;
  border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;
}
.gsheet-status{
  margin-top:10px;font-size:12px;color:#5a6e85;min-height:18px;
}
.gsheet-status.ok  {color:#1a6b3c;font-weight:700;}
.gsheet-status.err {color:#c0392b;font-weight:700;}
.gsheet-progress{
  height:4px;background:#d0dae8;border-radius:4px;margin-top:8px;overflow:hidden;
}
.gsheet-progress-bar{
  height:100%;width:0%;background:#1f5aaa;
  transition:width 0.4s;border-radius:4px;
}
</style>

<!-- ② Paste this HTML block just before </body> -->
<div class="gsheet-fab hidden" id="gsheetFab">
  <!-- Toggle panel button -->
  <button class="gsheet-btn sync" onclick="toggleGSheetPanel()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>
    Sync to Google Sheets
  </button>

  <!-- Expanded config + status panel -->
  <div class="gsheet-panel" id="gsheetPanel">
    <h4>📊 Google Sheets Sync</h4>
    <div class="gsheet-url-row">
      <input type="text" id="gsUrl" placeholder="Paste Web App URL here…" />
      <button onclick="saveGsUrl()">Save</button>
    </div>
    <div class="gsheet-progress"><div class="gsheet-progress-bar" id="gsBar"></div></div>
    <div class="gsheet-status" id="gsStatus">Enter your Apps Script Web App URL above, then click Sync.</div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="gsheet-btn sync" style="font-size:12px;padding:8px 14px;" onclick="doSync()">
        ↑ Sync Now
      </button>
      <button class="gsheet-btn open" style="font-size:12px;padding:8px 14px;" onclick="openSheet()" id="gsOpenBtn" disabled>
        ↗ Open Sheet
      </button>
    </div>
    <div style="margin-top:10px;font-size:10px;color:#8a9ab0;">
      Last sync: <span id="gsLastSync">never</span>
    </div>
  </div>
</div>

<!-- ③ Script — no external dependencies needed -->
<script>
(function(){

  // ── PASTE YOUR WEB APP URL HERE (or leave blank and enter in the panel) ──
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRrrVBzJUR1_56Lof3YKUhMTSAVQhfMteTRUtiDvhgeI-wOZVvOiEkJ2bI62MwqV-p/exec";
  // ────────────────────────────────────────────────────────────────────────

  // SECRET SHORTCUT: Press Ctrl+Shift+S to show/hide the sync panel
  // This keeps it hidden from regular users
  let keySeq = [];
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'S') {
      e.preventDefault();
      const fab = document.getElementById('gsheetFab');
      fab.classList.toggle('hidden');
      if (!fab.classList.contains('hidden')) {
        document.getElementById('gsheetPanel').classList.add('show');
      }
    }
  });

  const LS_KEY_URL  = "mpcs_gs_url";
  const LS_KEY_LAST = "mpcs_gs_last_sync";

  // Init URL field
  const storedUrl = localStorage.getItem(LS_KEY_URL) || APPS_SCRIPT_URL;
  if (storedUrl) {
    document.getElementById("gsUrl").value = storedUrl;
    document.getElementById("gsOpenBtn").disabled = false;
  }
  const lastSync = localStorage.getItem(LS_KEY_LAST);
  if (lastSync) document.getElementById("gsLastSync").textContent = lastSync;

  // ── AUTO-PULL FROM GOOGLE SHEETS ON LOAD ──────────────────────────────
  // This fixes the cross-device problem: when another device opens the app,
  // it pulls the latest data from Google Sheets into localStorage first.
  async function pullFromSheets() {
    const url = localStorage.getItem(LS_KEY_URL) || APPS_SCRIPT_URL;
    if (!url) return;
    try {
      // Apps Script doGet with action=read returns { ok, suppliers, purchases, payments }
      const resp = await fetch(url + "?action=read", { method: "GET" });
      if (!resp.ok) return;
      const json = await resp.json();
      if (!json.ok) return;
      // json directly contains suppliers/purchases/payments arrays
      if (json.suppliers && json.suppliers.length > 0) {
        localStorage.setItem("mpcs_suppliers", JSON.stringify(json.suppliers));
      }
      if (json.purchases && json.purchases.length > 0) {
        localStorage.setItem("mpcs_purchases", JSON.stringify(json.purchases));
      }
      if (json.payments && json.payments.length > 0) {
        localStorage.setItem("mpcs_payments", JSON.stringify(json.payments));
      }
      // Re-render the dashboard with fresh data
      if (typeof render === 'function') render();
      const ts = new Date().toLocaleString("en-LK");
      localStorage.setItem(LS_KEY_LAST, ts);
      if (document.getElementById("gsLastSync")) {
        document.getElementById("gsLastSync").textContent = ts;
      }
    } catch(e) {
      // Silent fail — don't disturb the user if pull fails
      console.warn("Auto-pull from Sheets failed:", e.message);
    }
  }

  // Pull latest data when page loads (fixes cross-device sync)
  pullFromSheets();

  window.toggleGSheetPanel = function() {
    document.getElementById("gsheetPanel").classList.toggle("show");
  };

  window.saveGsUrl = function() {
    const url = document.getElementById("gsUrl").value.trim();
    if (!url) return;
    localStorage.setItem(LS_KEY_URL, url);
    document.getElementById("gsOpenBtn").disabled = false;
    setStatus("URL saved. Ready to sync.", "ok");
  };

  window.openSheet = function() {
    const url = document.getElementById("gsUrl").value.trim();
    if (url) window.open(url, "_blank");
  };

  window.doSync = async function() {
    const url = document.getElementById("gsUrl").value.trim();
    if (!url) { setStatus("Please enter and save the Web App URL first.", "err"); return; }

    setBar(10);
    setStatus("Reading local data…");

    function getData(k) {
      try { return JSON.parse(localStorage.getItem("mpcs_" + k) || "[]"); }
      catch(e) { return []; }
    }

    const payload = {
      action    : "sync",
      suppliers : getData("suppliers"),
      purchases : getData("purchases"),
      payments  : getData("payments"),
    };

    setBar(30);
    setStatus("Connecting to Google Sheets…");

    try {
      const resp = await fetch(url, {
        method  : "POST",
        headers : { "Content-Type": "text/plain" },
        body    : JSON.stringify(payload),
      });

      setBar(80);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const json = await resp.json();
      if (!json.ok) throw new Error(json.error || "Unknown error");

      setBar(100);
      const ts = new Date().toLocaleString("en-LK");
      localStorage.setItem(LS_KEY_LAST, ts);
      document.getElementById("gsLastSync").textContent = ts;
      setStatus(
        `✓ Synced — ${json.suppliers} suppliers, ${json.purchases} purchases, ${json.payments} payments.`,
        "ok"
      );
      setTimeout(() => setBar(0), 1800);

    } catch(err) {
      setBar(0);
      setStatus("✗ Sync failed: " + err.message, "err");
      console.error("GSheets sync error:", err);
    }
  };

  function setBar(pct) {
    document.getElementById("gsBar").style.width = pct + "%";
  }

  function setStatus(msg, cls) {
    const el = document.getElementById("gsStatus");
    el.textContent = msg;
    el.className   = "gsheet-status" + (cls ? " " + cls : "");
  }

})();
</script>
</body>
</html>
