<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cheques – MPCS Payables</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@700&display=swap');
:root{--blue-900:#0a1628;--blue-800:#0d2244;--blue-700:#103060;--blue-600:#1a4a8a;--blue-500:#1f5aaa;--blue-400:#3a7bd5;--blue-100:#ddeeff;--blue-50:#f0f6ff;--gold:#c8941a;--bg:#f2f5fa;--surface:#ffffff;--border:#d0dae8;--text:#12243a;--muted:#5a6e85;--red:#c0392b;--red-lt:#fdecea;--green:#1a6b3c;--green-lt:#e3f5ea;--amber:#b45309;--amber-lt:#fef3c7;--shadow-sm:0 1px 4px rgba(10,22,40,0.08);--shadow-lg:0 8px 32px rgba(10,22,40,0.14);--radius:8px;--radius-sm:5px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
header{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-800) 60%,var(--blue-700) 100%);box-shadow:var(--shadow-lg);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:16px;padding:12px 28px;border-bottom:1px solid rgba(255,255,255,0.07);}
.brand-text h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2;}
.brand-text p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px;}
.header-right{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:2px;}
.system-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);}
.today-date{font-size:11px;color:rgba(255,255,255,0.5);}
.main-nav{background:var(--blue-800);padding:0 20px;}
.nav-inner{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-link{display:flex;align-items:center;gap:6px;padding:10px 16px;text-decoration:none;color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;white-space:nowrap;border-bottom:3px solid transparent;transition:color 0.15s,border-color 0.15s;}
.nav-link:hover{color:rgba(255,255,255,0.9);}
.nav-link.active{color:#fff;border-bottom-color:var(--gold);}
.page-wrap{padding:24px 28px;max-width:1280px;}
.page-title{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.page-title h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--blue-700);}
.title-line{flex:1;height:2px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.card-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--blue-600);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--blue-50);}
.stat-row{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;border-top:4px solid var(--blue-500);box-shadow:var(--shadow-sm);}
.stat-card.red{border-top-color:var(--red);}
.stat-card.gold{border-top-color:var(--gold);}
.stat-card.green{border-top-color:var(--green);}
.stat-card.blue{border-top-color:var(--blue-400);}
.stat-card p{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;}
.stat-card h3{font-size:20px;font-weight:900;color:var(--text);}
.stat-card h3.red{color:var(--red);}
.stat-card h3.blue{color:var(--blue-600);}
.stat-card h3.green{color:var(--green);}
.stat-card h3.gold{color:var(--amber);}
.btn{padding:9px 22px;border:none;border-radius:var(--radius-sm);font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.15s,transform 0.1s;}
.btn:active{transform:scale(0.97);}
.btn-danger{background:var(--red);color:#fff;}
.btn-warning{background:var(--amber);color:#fff;}
.btn-sm{padding:5px 12px;font-size:12px;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--blue-800);color:rgba(255,255,255,0.9);padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;white-space:nowrap;}
thead th:first-child{border-radius:var(--radius) 0 0 0;}
thead th:last-child{border-radius:0 var(--radius) 0 0;}
tbody tr:nth-child(even){background:var(--blue-50);}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);}
tbody tr:hover{background:#deeaf8;}
.empty-row td{text-align:center;color:var(--muted);padding:32px;font-style:italic;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-issued{background:#e2d9f3;color:#4a235a;}
.badge-pending{background:var(--amber-lt);color:var(--amber);}
.badge-cleared{background:var(--green-lt);color:var(--green);}
.badge-cancelled{background:var(--red-lt);color:var(--red);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--blue-700);color:#fff;padding:11px 22px;border-radius:var(--radius);font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;transform:translateY(10px);z-index:9999;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.toast-err{background:var(--red);}
.amt-blue{color:var(--blue-600);font-weight:700;}
select.inline-sel{border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:'Lato',sans-serif;font-size:12px;background:var(--blue-50);}
</style>
</head>
<body>
<div id="app-header"></div>

<div class="page-wrap">
  <div class="page-title"><h2>📋 Cheque Register</h2><div class="title-line"></div></div>
  <div class="stat-row" id="chqStats"></div>
  <div class="card" style="padding:14px 18px;">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
      <span style="font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;">Filter:</span>
      <select id="f-status" class="inline-sel" onchange="renderChqTable()"><option value="">All Statuses</option><option>Issued</option><option>Pending</option><option>Cleared</option><option>Cancelled</option></select>
      <select id="f-supplier" class="inline-sel" onchange="renderChqTable()" style="min-width:160px;"><option value="">All Suppliers</option></select>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Cheque Records</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Cheque No</th><th>Cheque Date</th><th>Payment Date</th><th>Supplier</th><th>Bank Name</th><th>Amount (LKR)</th><th>Status</th><th>Update Status</th><th>Actions</th></tr></thead>
      <tbody id="chequesTable"><tr class="empty-row"><td colspan="10">No cheque payments recorded.</td></tr></tbody>
    </table></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const COMPANY="Vali East Northern Division MPCS Ltd";
const ADDRESS="Point Pedro Road, Avarankal, Puttur, Atchuvely";
const LOGO_URL="images (1).jfif";
const PAGES=[
  {file:"index.html",label:"Dashboard",icon:"⊞"},
  {file:"suppliers.html",label:"Suppliers",icon:"👤"},
  {file:"purchases.html",label:"Purchases",icon:"🛒"},
  {file:"payments.html",label:"Payments",icon:"💳"},
  {file:"cheques.html",label:"Cheques",icon:"📋"},
  {file:"outstanding.html",label:"Outstanding",icon:"📊"},
  {file:"ledger.html",label:"Ledger",icon:"📒"},
  {file:"summary.html",label:"Summary",icon:"📑"},
];
function renderHeader(a){
  const today=new Date().toLocaleDateString('en-LK',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  const logoHTML=LOGO_URL?`<img src="${LOGO_URL}" alt="Logo" style="height:52px;width:52px;object-fit:contain;border-radius:8px;background:#fff;padding:3px;">`:`<div class="logo-box">VEM</div>`;
  const navLinks=PAGES.map(p=>`<a href="${p.file}" class="nav-link${a===p.file?' active':''}"><span>${p.icon}</span>${p.label}</a>`).join('');
  document.getElementById('app-header').innerHTML=`<header><div class="header-inner">${logoHTML}<div class="brand-text"><h1>${COMPANY}</h1><p>${ADDRESS}</p></div><div class="header-right"><span class="system-label">Supplier Payables System</span><span class="today-date">${today}</span></div></div><nav class="main-nav"><div class="nav-inner">${navLinks}</div></nav></header>`;
}
function getData(k){try{return JSON.parse(localStorage.getItem('mpcs_'+k)||'[]');}catch(e){return[];}}
function setData(k,v){localStorage.setItem('mpcs_'+k,JSON.stringify(v));}
function getSuppliers(){return getData('suppliers');}
function getPayments(){return getData('payments');}
function savePayments(d){setData('payments',d);}
function fmt(n){return Number(n||0).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2});}
function toast(msg,isErr=false){
  let t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(isErr?' toast-err':'');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2800);
}

renderHeader('cheques.html');

const CHQ_BADGE={Issued:'badge-issued',Pending:'badge-pending',Cleared:'badge-cleared',Cancelled:'badge-cancelled'};

function populateChqFilter(){
  const sel=document.getElementById('f-supplier');
  getSuppliers().forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
}

function updateChqStatus(id,status){
  const pays=getPayments();
  const p=pays.find(p=>p.id===id);
  if(p){p.chqStatus=status;savePayments(pays);renderChqTable();toast('Cheque status updated.');}
}

function deleteChq(id){
  if(!confirm('Delete this cheque payment record?'))return;
  savePayments(getPayments().filter(p=>p.id!==id));
  renderChqTable();toast('Cheque record deleted.');
}

function renderChqTable(){
  const all=getPayments().filter(p=>p.method==='Cheque');
  const issued=all.filter(c=>c.chqStatus==='Issued').reduce((a,c)=>a+Number(c.amount),0);
  const pending=all.filter(c=>c.chqStatus==='Pending').reduce((a,c)=>a+Number(c.amount),0);
  const cleared=all.filter(c=>c.chqStatus==='Cleared').reduce((a,c)=>a+Number(c.amount),0);
  const cancelled=all.filter(c=>c.chqStatus==='Cancelled').length;
  document.getElementById('chqStats').innerHTML=`
    <div class="stat-card blue"><p>Total Cheques</p><h3>${all.length}</h3></div>
    <div class="stat-card gold"><p>Issued Amt</p><h3 class="gold">LKR ${fmt(issued)}</h3></div>
    <div class="stat-card"><p>Pending Amt</p><h3>LKR ${fmt(pending)}</h3></div>
    <div class="stat-card green"><p>Cleared Amt</p><h3 class="green">LKR ${fmt(cleared)}</h3></div>
    <div class="stat-card red"><p>Cancelled</p><h3 class="red">${cancelled}</h3></div>`;

  const fStatus=document.getElementById('f-status').value;
  const fSup=document.getElementById('f-supplier').value;
  let cheques=[...all];
  if(fStatus)cheques=cheques.filter(c=>c.chqStatus===fStatus);
  if(fSup)cheques=cheques.filter(c=>c.supplierId==fSup);

  const tbody=document.getElementById('chequesTable');
  if(!cheques.length){tbody.innerHTML='<tr class="empty-row"><td colspan="10">No records found.</td></tr>';return;}
  tbody.innerHTML=[...cheques].reverse().map((c,i)=>`<tr>
    <td>${cheques.length-i}</td>
    <td><strong>${c.chqNo||'—'}</strong></td>
    <td>${c.chqDate||'—'}</td>
    <td>${c.date}</td>
    <td>${c.supplier}</td>
    <td>${c.bank||'—'}</td>
    <td class="amt-blue">${fmt(c.amount)}</td>
    <td><span class="badge ${CHQ_BADGE[c.chqStatus]||'badge-pending'}">${c.chqStatus}</span></td>
    <td><select class="inline-sel" onchange="updateChqStatus(${c.id},this.value)">${['Issued','Pending','Cleared','Cancelled'].map(s=>`<option ${s===c.chqStatus?'selected':''}>${s}</option>`).join('')}</select></td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteChq(${c.id})">✕ Del</button></td>
  </tr>`).join('');
}

populateChqFilter();renderChqTable();
</script>
</body>
</html>
